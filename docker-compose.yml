services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime

    ports:
      - "8000:8000"

    user: "1000:1000"

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/analyzer.db
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s


  frontend:
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "3000:80"

    depends_on:
      backend:
        condition: service_healthy

    restart: unless-stopped
