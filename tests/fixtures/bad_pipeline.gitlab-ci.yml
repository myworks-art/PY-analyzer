# Тестовый файл: намеренно содержит множество проблем
# Используется для ручного и автоматического тестирования анализатора

image: python:latest  # SEC002: latest tag

variables:
  DB_PASSWORD: "supersecret123"   # SEC001: секрет в открытом виде
  API_TOKEN: "ghp_xxxxxxxxxxxx"   # SEC001: токен в открытом виде
  APP_ENV: "production"

stages:
  - build
  - deploy  # REL004: нет стадии test

build-app:
  stage: build
  before_script:
    - apt-get update
    - pip install -r requirements.txt  # PERF001: нет cache
  script:
    - python setup.py build
  artifacts:
    paths:
      - dist/
    # PERF002: нет expire_in
    public: true  # SEC004: публичные артефакты

run_tests:  # BP002: snake_case при kebab-case у других
  stage: build
  before_script:
    - apt-get update
    - pip install -r requirements.txt  # PERF001 + PERF005: дублирование
  script:
    - pytest tests/

deploy-Production:  # REL005: нет rules/only
  stage: deploy
  script:
    - curl https://raw.githubusercontent.com/example/deploy/main/deploy.sh | bash  # SEC006
  timeout: 4h  # PERF003: избыточный таймаут
  # REL001: нет retry
  # BP003: нет environment
