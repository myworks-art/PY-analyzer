# Тестовый файл
# Используется для ручного и автоматического тестирования анализатора

image: python:latest  # SEC002

variables:
  DB_PASSWORD: "supersecret123"   # SEC001
  API_TOKEN: "ghp_xxxxxxxxxxxx"   # SEC001
  APP_ENV: "production"

stages:
  - build
  - deploy  # REL004

build-app:
  stage: build
  before_script:
    - apt-get update
    - pip install -r requirements.txt  # PERF001
  script:
    - python setup.py build
  artifacts:
    paths:
      - dist/  # PERF002
    public: true  # SEC004

run_tests:  # BP002
  stage: build
  before_script:
    - apt-get update
    - pip install -r requirements.txt  # PERF001 + PERF005
  script:
    - pytest tests/

deploy-Production:  # REL005
  stage: deploy
  script:
    - curl https://raw.githubusercontent.com/example/deploy/main/deploy.sh | bash  # SEC006
  timeout: 4h  # PERF003
  # REL001
  # BP003
